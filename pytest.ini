[pytest]
# Diretorio de cache dentro do projeto para evitar PytestCacheWarning em Windows
cache_dir = pytest_cache

# Restringe a coleta aos testes do projeto e ignora artefatos temporarios
testpaths = tests
norecursedirs =
    .git
    .claude
    .pytest_cache
    .pytest_tmp
    pytest_cache
    pytest_tmp
    pytest_artifacts
    pytest-cache-files-*

# Marcadores personalizados
markers =
    integration: testes ponta a ponta que requerem o Excel real em data/raw/

# Warnings
filterwarnings =
    ignore::pytest.PytestCacheWarning
